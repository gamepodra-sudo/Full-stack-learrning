<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .search{
            padding: 8px 50px 8px 10px;
            border-radius: 5px;
            border: 1px solid black;
            color: gray;

        }

        .search-2{
            padding: 8px 8px 10px;
            width: 400px;
            border-radius: 20px;
            border: none;
            box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.50);
            
        }

        .cat4{
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 100%;
            object-position: center;
            vertical-align: middle;
            margin-right: 5px;
        }

        .txt{
            vertical-align: middle;
            border: none;
            margin-right: 100px;
            padding: 8px 8px 10px;
            width: 300px;
        }

        .twt{
            border: none;
            background-color: rgb(0, 110, 255);
            color: white;
            padding: 8px 15px 8px 15px;
            border-radius: 20px;
            
        }
    </style>
    <input class="search" type="text" placeholder="Search"><br><br>
    <input class="search-2" type="text" placeholder="Search Google or type a URL"><br><br>
    <img class="cat4" src="images/cat.jpg" alt="">
    <input class="txt" placeholder="What's happening?" type="text">
    <button class="twt">Tweet</button>
</body>
    
</html>
