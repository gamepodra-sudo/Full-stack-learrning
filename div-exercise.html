<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .box1{
            height: 330px;
            width: 210px;
            border: 2px solid black;
            padding: 10px;
            display: inline-block;
            margin-right: 20px;
        }
        img{
            width: 200px;
            height: 200px;
            object-fit: cover;
            object-position: center;
        }

        .main{
            font-weight: bold;
            font-family: arial;
            margin-top: 2px;
        }

        .sub{
            margin-top: -13px;
            color: gray;
        }

        button{
            background-color: rgb(24, 83, 211);
            border: none;
            padding: 8px 20px 8px 20px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
    </style>
    <div class="box1">
        <img src="YOUTUBE-CLONE/images/cat.jpg" alt="">
        <p class="main">Oliver</p>
        <p class="sub">2 mutual friends</p>
        <button>Add Friend</button>
    </div>

    <div class="box1">
        <img src="images/cat2.jpg" alt="">
        <p class="main">Mio</p>
        <p class="sub">6 mutual friends</p>
        <button>Add Friend</button>
    </div>

    <div class="box1">
        <img src="images/cat3.jpg" alt="">
        <p class="main">Ginger</p>
        <p class="sub">4 mutual friends</p>
        <button>Add Friend</button>
    </div>
    <img src="YOUTUBE-CLONE/images/thumb1.avif" alt="">
</body>
</html>
