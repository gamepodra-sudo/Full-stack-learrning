<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 10px;
        }

        .col {
            color: rgb(1, 173, 1);
            font-size: 25px;
        }

        .bold {
            font-weight: normal;
        }

        .add {
            border: none;
            height: 40px;
            width: 140px;
            border-radius: 20px;
            background-color: rgb(255, 230, 0);
            color: rgb(0, 0, 0);
            cursor: pointer;
            font-size: 17px;
        }
        
        .buy {
            border: none;
            height: 40px;
            width: 140px;
            border-radius: 20px;
            background-color: rgb(255, 174, 0);
            color: rgb(0, 0, 0);
            cursor: pointer;
            font-size: 17px;
            transition: 0.7s;
        }

        .buy:hover{
            opacity: 0.8;
        }

        .buy:active{
            background-color:  rgb(0, 243, 0);
        }

        button{
            margin: 5px;
        }

    </style>
</head>

<body>
    <a href="amazon.com">Back to Amazon</a><br>
    <h1>Nike Black Running Shoes</h1>
    <h3 class="col">$39 - in stock</h3>
    <h3 class="bold">Free delivery tomorrow</h3>
    <button class="add">Add to Cart</button>
    <button class="buy">Buy now</button>
</body>

</html>
