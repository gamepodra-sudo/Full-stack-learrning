<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .sub {
            color: white;
            background: rgb(212, 17, 17);
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 12px;
            padding-bottom: 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .sub:hover{
            opacity: 0.7;
            transition: 0.4s;
        }

        .sub:active{
            opacity: 0.5;
        }
        
        .join {
            color: rgb(74, 74, 250);
            background-color: white;
            border: 2px solid rgb(74, 74, 250);
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 10px;
            padding-bottom: 10px;
            cursor: pointer;
        }

        .join:active{
            opacity: 0.5;
        }

        .join:hover{
            background-color:rgb(74, 74, 250 );
            color: white;
            transition: 0.4s;
        }

        .tweet {
            color: white;
            background-color: rgb(74, 74, 250);
            font-weight: bold;
            border: none;
            border-radius: 50px;
            transition: 0.6s;
            cursor: pointer;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .tweet:hover{
            box-shadow: 2px 2px 10px rgba(54, 54, 54, 0.6);
        }
        
    </style>
</head>

<body>
    <button class="sub">
        SUSBCRIBE
    </button>
    <button class="join">
        JOIN
    </button>
    <button class="tweet">
        TWEET
    </button>
</body>

</html>
