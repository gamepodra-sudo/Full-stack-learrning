<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .name{
            padding: 8px 15px 8px 15px;
            border-radius: 5px;
            border: 1px solid gray;
            width: 40%;
            display: inline-block;
        }

        .name2{
            padding: 8px 15px 8px 15px;
            border-radius: 5px;
            border: 1px solid gray;
            display: block;
            margin-top: 10px;
            width: 86%;
        }

        .sign{
            margin-top: 10px;
            padding: 8px 15px 8px 15px;
            border-radius: 5px;
            background-color: rgb(0, 106, 226);
            color: white;
            border: none;
            font-family: arial;
            width: 360px;
        }

        .box{
            display: block;
            width: 100%;
            margin-top: 5px;
            padding: 8px 15px 8px 15px;
            background-color: rgb(240, 240, 240);
            border: none;
        }

        .req, .later{
            margin-top: 15px;
            padding: 8px 15px 8px 15px;
            border-radius: 5px;
        }

        .req{
            background-color: black;
            color: white;
            border: none;
        }

        .later{
            background-color: rgb(240, 240, 240);
            border: none;
        }
    </style>
    <input class="name" type="text" placeholder="First name">
    <input class="name" type="text" placeholder="Last name">
    <input class="name2" type="text" placeholder="Email">
    <center><button class="sign">Sign Up</button></center><br><br><br>

    <h1 class="ride">Request a ride now</h1>
    <input class="box" type="text" placeholder="Enter pickup location">
    <input class="box" type="text" placeholder="Enter destination">
    <button class="req">Request Now</button>
    <button class="later">Schedule for later</button>
</body>

</html>
