<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sub {
            color: white;
            background: rgb(212, 17, 17);
            height: 35px;
            width: 105px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .join {
            color: rgb(74, 74, 250);
            background-color: white;
            border: 2px solid rgb(74, 74, 250);
            height: 35px;
            width: 60px;
            cursor: pointer;
        }

        .tweet {
            color: white;
            background-color: rgb(74, 74, 250);
            height: 35px;
            font-weight: bold;
            border: none;
            width: 70px;
            border-radius: 50px;
            cursor: pointer;
        }

        button {
            margin: 2px;
        }

        .req {
            height: 40px;
            width: 110px;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        .add {
            border: none;
            height: 30px;
            width: 160px;
            border-radius: 40px;
            background-color: rgb(255, 238, 0);
            cursor: pointer;
        }

        .sign {

            border: none;
            height: 35px;
            width: 100px;
            border-radius: 8px;
            background-color: rgb(14, 172, 0);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .get {
            border: none;
            height: 40px;
            width: 115px;
            border-radius: 3px;
            background-color: rgb(154, 0, 214);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .down {
            border: none;
            height: 40px;
            width: 115px;
            border-radius: 3px;
            background-color: rgb(255, 255, 255);
            color: rgb(154, 0, 214);
            font-weight: bold;
            border: 1px solid rgb(154, 0, 214);
            cursor: pointer;
        }

        .app {
            border: none;
            height: 40px;
            width: 240px;
            border-radius: 20px;
            background-color: rgb(0, 89, 255);
            color: rgb(255, 255, 255);
            font-weight: bold;
            cursor: pointer;
        }

        .save {
            border: none;
            height: 40px;
            width: 100px;
            border-radius: 20px;
            background-color: rgb(255, 255, 255);
            color: rgb(0, 89, 255);
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgb(0, 89, 255);
            font-size: 17px;
        }
    </style>
</head>

<body>
    <button class="sub">
        SUSBCRIBE
    </button>
    <button class="join">
        JOIN
    </button>
    <button class="tweet">
        TWEET
    </button>
    <button class="req">
        Request Now
    </button>
    <button class="add">
        Add to Cart
    </button>
    <button class="sign">
        Sign up
    </button>
    <button class="get">
        Get started
    </button>
    <button class="down">
        Download
    </button><br>
    <button class="app">
        Apply on company website
    </button>
    <button class="save">
        Save
    </button>
</body>

</html>
